<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESEDI'S BANK</title>
</head>
<body>

    <h1>🏦 Mini Bank</h1>
    <h2 id="owner-name"></h2>
    <h3>Balance: R<span id="balance">0</span></h3>

    <input type="number" id="amount-input" placeholder="Enter amount" />
    <button id="deposit-btn">Deposit</button>
    <button id="withdraw-btn">Withdraw</button>
    <button id="interest-btn">Add Interest</button>

    <h4>Transaction History</h4>
    <!-- where transaction history will be shown -->
    <ul id="history-list"></ul>

    <script src="script.js"></script>
</body>
</html>
