<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESEDI'S BANK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="background">

    <h1 >🏦 Mini Bank</h1>
    <h2 id="owner-name" class="name"></h2>
    <h3 class="balance">Balance: R<span id="balance">0</span></h3>

    <div class="transactions">
        <input type="number" id="amount-input" placeholder="Enter amount" />
        <button id="deposit-btn">Deposit</button>
        <button id="withdraw-btn">Withdraw</button>
        <button id="interest-btn">Add Interest</button>
    </div>
    

    <h4 class="transhistory">Transaction History</h4>
    <!-- where transaction history will be shown -->
    <ul id="history-list"></ul>

    <script src="script.js"></script>
</body>

</html>
